<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>400 - Yêu cầu không hợp lệ</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        
        :root {
            --bg-body: #F3F4F6;
            --text-body: #1F2937;
            --card-bg: rgba(255, 255, 255, 0.6);
            --card-border: rgba(255, 255, 255, 0.4);
            --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.08);
            --text-title: #3B82F6;
            --text-desc: #6B7280;
            --btn-bg: #3B82F6;
            --btn-hover: #2563EB;
            --btn-shadow: rgba(59, 130, 246, 0.3);
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --bg-body: #111827;
                --text-body: #F9FAFB;
                --card-bg: rgba(31, 41, 55, 0.85);
                --card-border: rgba(75, 85, 99, 0.5);
                --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
                --text-title: #60A5FA;
                --text-desc: #9CA3AF;
                --btn-bg: #2563EB;
                --btn-hover: #3B82F6;
                --btn-shadow: rgba(37, 99, 235, 0.5);
            }
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-body);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .error-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 50px 30px;
            border-radius: 24px;
            box-shadow: var(--card-shadow);
            border: 1px solid var(--card-border);
            max-width: 90%;
            width: 400px;
            transition: background 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .error-code {
            font-size: 72px;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #0A84FF, #5E5CE6);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: none;
            -webkit-text-stroke: 0;
        }

        .error-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 15px;
            color: var(--text-title);
            transition: color 0.3s ease;
        }

        .error-desc {
            font-size: 15px;
            color: var(--text-desc);
            margin-bottom: 30px;
            line-height: 1.5;
            transition: color 0.3s ease;
        }

        .home-btn {
            display: inline-block;
            background-color: var(--btn-bg);
            color: white;
            padding: 12px 28px;
            border-radius: 24px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px var(--btn-shadow);
        }

        .home-btn:hover {
            background-color: var(--btn-hover);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px var(--btn-shadow);
        }

        .error-code .reveal-word {
            background: linear-gradient(90deg, #0A84FF, #5E5CE6);
            background-repeat: no-repeat;
            background-size: 100% 100%;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }

        .reveal-word {
            display: inline-block;
            opacity: 0;
            transform: translateY(14px);
            transition: opacity .5s ease, transform .5s ease;
        }
        .reveal-word.active {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>
    <div class="error-card">
        <div class="error-code word-reveal">400</div>
        <div class="error-title word-reveal">Yêu cầu không hợp lệ!</div>
        <div class="error-desc word-reveal">Máy chủ không thể xử lý yêu cầu của bạn do cú pháp đường link có vấn đề.</div>
        <a href="/" class="home-btn word-reveal">Quay lại Trang chủ</a>
    </div>
    <script>
        function wrapWordsInPlace(el) {
            var skipTags = ['I', 'IMG', 'SVG', 'SCRIPT', 'STYLE'];
            function walk(node) {
                Array.from(node.childNodes).forEach(function (child) {
                    if (child.nodeType === Node.TEXT_NODE) {
                        var text = child.textContent;
                        if (!text.trim()) return;
                        var frag = document.createDocumentFragment();
                        var parts = text.split(/(\s+)/);
                        parts.forEach(function (part) {
                            if (part === '') return;
                            if (/^\s+$/.test(part)) {
                                frag.appendChild(document.createTextNode(part));
                            } else {
                                var span = document.createElement('span');
                                span.className = 'reveal-word';
                                span.textContent = part;
                                frag.appendChild(span);
                            }
                        });
                        node.replaceChild(frag, child);
                    } else if (child.nodeType === Node.ELEMENT_NODE) {
                        if (skipTags.indexOf(child.tagName) !== -1) return;
                        walk(child);
                    }
                });
            }
            walk(el);
        }

        var wordRevealTargets = document.querySelectorAll('.word-reveal');
        wordRevealTargets.forEach(function (el) { wrapWordsInPlace(el); });

        var wordObserver = new IntersectionObserver(function (entries) {
            entries.forEach(function (entry) {
                if (entry.isIntersecting) {
                    var spans = entry.target.querySelectorAll('.reveal-word');
                    spans.forEach(function (span, i) {
                        span.style.transitionDelay = Math.min(i * 45, 900) + 'ms';
                    });
                    requestAnimationFrame(function () {
                        spans.forEach(function (span) { span.classList.add('active'); });
                    });
                    wordObserver.unobserve(entry.target);
                }
            });
        }, { threshold: 0.15 });

        wordRevealTargets.forEach(function (el) { wordObserver.observe(el); });
    </script>
</body>
</html>
