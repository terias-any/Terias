# netlify.toml

[build]
  publish = "."

# 1. 404 - Tự động cho mọi đường dẫn không tồn tại
[[redirects]]
  from = "/*"
  to = "/errors/404.html"
  status = 404

# 2. 403 - Ví dụ: chặn truy cập thư mục admin
[[redirects]]
  from = "/admin/*"
  to = "/errors/403.html"
  status = 403

# 3. 400 - Ví dụ: lỗi tham số không hợp lệ
[[redirects]]
  from = "/api/query"
  to = "/errors/400.html"
  status = 400

# 4. 500 - Ví dụ: route giả lập lỗi server
[[redirects]]
  from = "/server-error"
  to = "/errors/500.html"
  status = 500